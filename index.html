<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Madrid NFC</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffffff, #0b1d3a);
    color: #111;
    text-align: center;
}

.container {
    padding: 20px;
}

.card {
    background: linear-gradient(145deg, #ffffff, #0b1d3a);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
}

/* JUGADOR */
.card-fc {
    position: relative;
    width: 90%;
    max-width: 320px;
    height: 480px;
    margin: 20px auto;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255,215,0,0.6);
}

/* FONDO */
.card-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(11,29,58,0.95)),
        radial-gradient(circle at top, rgba(255,215,0,0.3), transparent 60%);
    z-index: 1;
}

/* JUGADOR */
.card-player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 85%;
    max-height: 320px;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}

/* INFO */
.card-info {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.8));
    z-index: 3;
    color: white;
}

.card-name {
    font-size: 20px;
    font-weight: bold;
}

.card-details {
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 16px;
    margin-top: 5px;
}

.card-details span {
    background: rgba(255,255,255,0.2);
    padding: 4px 10px;
    border-radius: 8px;
}

.top-img {
    width: 120px;
    margin: 20px auto 10px;
    display: block;
}

.player-name {
    font-size: 26px;
    font-weight: bold;
    margin-top: 10px;
}

.player-number {
    font-size: 60px;
    font-weight: bold;
    color: #FFD700;
}

/* BOTONES */
.btn {
    display: block;
    margin: 10px auto;
    padding: 15px;
    width: 90%;
    max-width: 400px;
    background: #0b1d3a;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #09152c;
    transform: scale(1.03);
}

/* BOTÓN PREMIUM */
.btn-premium {
    display: block;
    width: 90%;
    max-width: 320px;
    margin: 25px auto;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #111;
    text-decoration: none;
    border-radius: 15px;
    position: relative;
    overflow: hidden;

    background: linear-gradient(
        135deg,
        #FFD700,
        #FFC300,
        #FFB300,
        #FFD700
    );

    box-shadow:
        0 0 15px rgba(255, 215, 0, 0.6),
        0 0 30px rgba(255, 215, 0, 0.4);

    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.btn-premium:hover {
    transform: scale(1.05);
    box-shadow:
        0 0 25px rgba(255, 215, 0, 0.9),
        0 0 50px rgba(255, 215, 0, 0.6);
}

/* BRILLO */
.btn-premium::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: rgba(255,255,255,0.4);
    transform: skewX(-20deg);
    animation: brillo 3s infinite;
}

@keyframes brillo {
    0% { left: -75%; }
    100% { left: 125%; }
}

/* SEPARADOR */
.separador {
    width: 100%;
    height: 8px;
    background: linear-gradient(
        90deg,
        #FFD700,
        #ffffff,
        #0b1d3a
    );
    margin: 25px 0;
    border-radius: 4px;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

@media (min-width: 768px) {
    .container {
        max-width: 600px;
        margin: auto;
    }
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="top-img">
    <div class="player-name" id="player-name">Jugador</div>
    <div class="player-number" id="player-number">7</div>
<div class="card-fc">
    <div class="card-bg"></div>
    <img id="player-img" class="card-player" src="">
    <div class="card-info">
        <div id="player-name" class="card-name"></div>
        <div class="card-details">
            <span id="player-position"></span>
            <span id="player-number"></span>
        </div>
    </div>
</div>

<!-- BOTONES PREMIUM -->
<div id="premium-container">
    <a id="btn-premium-1" class="btn-premium" target="_blank">⭐ Instagram</a>
    <a id="btn-premium-2" class="btn-premium" target="_blank">🎥 Video</a>
    <a id="btn-premium-3" class="btn-premium" target="_blank">📊 Perfil</a>
</div>

<div class="separador"></div>

<a class="btn" href="https://www.realmadrid.com" target="_blank">
🌐 Sitio Oficial
</a>

<a class="btn" href="https://www.youtube.com/@realmadrid" target="_blank">
▶️ YouTube Oficial
</a>

<a class="btn" href="https://www.instagram.com/realmadrid/" target="_blank">
📸 Instagram Oficial
</a>

<a class="btn" href="https://www.realmadrid.com/entradas" target="_blank">
🎟️ Boletos
</a>

<a class="btn" href="https://shop.realmadrid.com/" target="_blank">
🛒 Tienda Oficial
</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=real+madrid+proximo+partido" target="_blank">
📅 Próximo Partido
</a>

<a class="btn" href="https://www.google.com/search?q=real+madrid+calendario" target="_blank">
🗓️ Calendario
</a>

<a class="btn" href="https://www.google.com/search?q=tabla+la+liga" target="_blank">
📊 Tabla La Liga
</a>

<div class="separador"></div>

<a class="btn" href="https://www.google.com/search?q=palmares+real+madrid" target="_blank">
🏆 Palmarés
</a>

<a class="btn" href="https://www.google.com/search?q=real+madrid+vs+barcelona+historial" target="_blank">
⚔️ El Clásico
</a>

</div>

<script>
const jugadores = {
    bellingham: {
        nombre: "Jude Bellingham",
        numero: "5",
        posicion: "MED",
        imagen: "bellingham.jpg",
        links: [
            "https://www.instagram.com/judebellingham/",
            "https://www.youtube.com/results?search_query=bellingham+goals",
            "https://www.google.com/search?q=jude+bellingham+estadisticas"
        ]
    },
    vinicius: {
        nombre: "Vinicius Jr",
        numero: "7",
        posicion: "DEL",
        imagen: "vinicius.jpg",
        links: [
            "https://www.instagram.com/vinijr/",
            "https://www.youtube.com/results?search_query=vinicius+goals",
            "https://www.google.com/search?q=vinicius+estadisticas"
        ]
    }
};

const params = new URLSearchParams(window.location.search);
const jugador = params.get("jugador");

if (jugadores[jugador]) {

    document.getElementById("player-name").innerText = jugadores[jugador].nombre;
    document.getElementById("player-number").innerText = jugadores[jugador].numero;
    document.getElementById("player-position").innerText = jugadores[jugador].posicion;
    document.getElementById("player-img").src = jugadores[jugador].imagen;

    document.getElementById("btn-premium-1").href = jugadores[jugador].links[0];
    document.getElementById("btn-premium-2").href = jugadores[jugador].links[1];
    document.getElementById("btn-premium-3").href = jugadores[jugador].links[2];

} else {
    document.getElementById("player-name").innerText = "Real Madrid";
    document.getElementById("player-number").innerText = "⚽";
}
</script>

</body>
</html>
